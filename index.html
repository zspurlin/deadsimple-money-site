<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dead Simple</title>
  <meta name="description" content="Investment research, graded and tracked. Every call is a card with a Dead Simple Score and live alpha vs the S&P 500. No hype. No noise. Just signal." />
  <meta name="theme-color" content="#05070c" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Dead Simple" />
  <meta property="og:description" content="Investment research, graded and tracked. Alpha vs the S&P 500 on every call." />
  <meta property="og:url" content="https://deadsimple.money/" />
  <meta property="og:site_name" content="Dead Simple" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Dead Simple" />
  <meta name="twitter:description" content="Investment research, graded and tracked. Alpha vs the S&P 500 on every call." />
  <meta name="twitter:site" content="@DeadSimpleMoney" />

  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="canonical" href="https://deadsimple.money/" />

  <style>
    :root {
      --bg: #05070c;
      --panel: #0d1320;
      --hairline: #223049;
      --text: #eef2f8;
      --muted: #93a1b8;
      --faint: #5d6b85;
      --accent: #3d82e8;
      --pos: #57d08a;
      --neg: #ff6b6b;
      --serif: "Didot", "Bodoni 72", "Cormorant Garamond", Georgia, "Times New Roman", serif;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(80% 50% at 50% 0%, rgba(61,130,232,0.10), rgba(0,0,0,0) 60%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 1080px; margin: 0 auto; padding: 3rem 1.25rem 5rem; }

    /* Header */
    header { text-align: center; margin-bottom: 2.5rem; }
    .brand { display: inline-flex; align-items: center; gap: 0.7rem; }
    .brand img { width: 46px; height: 46px; display: block; }
    h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(2.4rem, 7vw, 4rem);
      letter-spacing: -0.01em;
      margin: 0;
      color: #fafafa;
    }
    .accent-rule { width: 36px; height: 2px; margin: 1.1rem auto; background: var(--accent); border: 0; }
    .tagline {
      font-style: italic; font-weight: 600; color: var(--muted);
      margin: 0 0 0.4rem; font-size: clamp(1.15rem, 3vw, 1.4rem);
    }
    .subline {
      color: var(--faint); margin: 0; font-size: 0.95rem;
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* Tabs */
    nav.tabs {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem;
      margin: 2.5rem 0 2rem; border-bottom: 1px solid var(--hairline);
    }
    .tab {
      background: none; border: 0; color: var(--muted); font: inherit;
      font-size: 0.95rem; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 0.8rem 1.2rem; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 150ms ease, border-color 150ms ease;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab .count {
      display: inline-block; margin-left: 0.4rem; font-size: 0.75rem;
      color: var(--faint); font-variant-numeric: tabular-nums;
    }

    /* Gallery */
    .gallery {
      display: grid; gap: 1.6rem;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    }
    .tile {
      display: block; text-decoration: none; color: inherit;
      transition: transform 160ms ease;
    }
    .tile:hover { transform: translateY(-4px); }
    .tile img {
      width: 100%; aspect-ratio: 5 / 7; object-fit: cover;
      border-radius: 14px; border: 1px solid var(--hairline);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      display: block;
    }
    .tile-meta {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-top: 0.7rem; padding: 0 0.2rem;
    }
    .tile-alpha { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .tile-alpha.pos { color: var(--pos); }
    .tile-alpha.neg { color: var(--neg); }
    .tile-alpha.flat { color: var(--muted); }
    .tile-sub { font-size: 0.78rem; color: var(--faint); letter-spacing: 0.04em; text-transform: uppercase; }
    .tile-alpha-label { font-size: 0.7rem; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; display: block; }

    .empty {
      text-align: center; color: var(--muted); padding: 4rem 1rem;
      border: 1px dashed var(--hairline); border-radius: 16px;
    }
    .empty strong { color: var(--text); display: block; margin-bottom: 0.4rem; font-size: 1.1rem; }

    /* Top-right About link */
    .top-nav { position: absolute; top: 1.4rem; right: 1.4rem; z-index: 5; }
    .top-nav a {
      display: inline-block; padding: 0.55rem 1.2rem;
      border: 1px solid var(--accent); border-radius: 999px;
      color: var(--text); background: rgba(61, 130, 232, 0.12);
      text-decoration: none; font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 150ms ease, border-color 150ms ease, background 150ms ease;
    }
    .top-nav a:hover, .top-nav a:focus-visible {
      color: #fff; background: rgba(61, 130, 232, 0.28); outline: none;
    }
    /* Phones: tuck the pill into the corner so it clears the wordmark. */
    @media (max-width: 640px) {
      .top-nav { top: 0.6rem; right: 0.6rem; }
      .top-nav a { padding: 0.4rem 0.9rem; font-size: 0.75rem; }
    }

    /* Footer */
    footer { text-align: center; margin-top: 4rem; }
    nav.links { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; }
    nav.links a {
      display: inline-block; padding: 0.6rem 1.2rem; border: 1px solid var(--hairline);
      color: var(--muted); text-decoration: none; font-size: 0.82rem;
      letter-spacing: 0.06em; text-transform: uppercase; border-radius: 999px;
      transition: color 150ms ease, border-color 150ms ease;
    }
    nav.links a:hover, nav.links a:focus-visible { color: var(--accent); border-color: var(--accent); outline: none; }
    .foot-note { color: var(--faint); font-size: 0.8rem; margin-top: 1.4rem; }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Site">
    <a href="about.html">About</a>
  </nav>

  <div class="wrap">
    <header>
      <div class="brand">
        <img src="assets/logo.png" alt="Dead Simple logo" />
        <h1>Dead Simple</h1>
      </div>
      <hr class="accent-rule" aria-hidden="true" />
      <p class="tagline">Clarity in a noisy market</p>
      <p class="subline">No hype. No noise. Just signal.</p>
    </header>

    <nav class="tabs" aria-label="Positions">
      <button class="tab active" data-bucket="open">Open <span class="count" data-count="open"></span></button>
      <button class="tab" data-bucket="watchlist">Watchlist <span class="count" data-count="watchlist"></span></button>
      <button class="tab" data-bucket="closed">Closed <span class="count" data-count="closed"></span></button>
    </nav>

    <main class="gallery" id="gallery" aria-live="polite"></main>

    <footer>
      <nav class="links" aria-label="Site and social channels">
        <a href="about.html">About</a>
        <a href="https://www.youtube.com/@deadsimplehq" rel="noopener" target="_blank">YouTube</a>
        <a href="https://www.tiktok.com/@deadsimplehq" rel="noopener" target="_blank">TikTok</a>
        <a href="https://x.com/DeadSimpleMoney" rel="noopener" target="_blank">X</a>
        <a href="https://deadsimplehq.substack.com" rel="noopener" target="_blank">Substack</a>
      </nav>
      <p class="foot-note">Every card is graded at publish and tracked against the S&amp;P 500 from that day forward.</p>
    </footer>
  </div>

  <script>
    const BUCKETS = ["open", "watchlist", "closed"];
    const EMPTY = {
      open: "No open positions yet.",
      watchlist: "Nothing on the watchlist yet.",
      closed: "No closed positions yet."
    };
    let DATA = null;
    let active = "open";

    function alphaClass(a) {
      if (!a || a === "\u2014") return "flat";
      if (a.trim().startsWith("-")) return "neg";
      if (a.trim().startsWith("+")) return "pos";
      return "flat";
    }

    function tile(item) {
      const dir = item.dir || item.ticker;
      const alpha = item.alpha || "\u2014";
      const a = document.createElement("a");
      a.className = "tile";
      a.href = `cards/${dir}/card.html`;
      a.innerHTML = `
        <img src="cards/${dir}/card_front.png" alt="${item.ticker} card" loading="lazy" />
        <div class="tile-meta">
          <span>
            <span class="tile-alpha-label">Alpha vs S&amp;P</span>
            <span class="tile-alpha ${alphaClass(alpha)}">${alpha}</span>
          </span>
          <span class="tile-sub">${item.research_date || ""}</span>
        </div>`;
      return a;
    }

    function render() {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      if (!DATA) {
        gallery.style.display = "block";
        gallery.innerHTML = `<div class="empty"><strong>Cards are on their way.</strong>Publish from the research engine to populate this page.</div>`;
        return;
      }

      const items = DATA[active] || [];
      if (items.length === 0) {
        gallery.style.display = "block";
        gallery.innerHTML = `<div class="empty"><strong>${EMPTY[active]}</strong></div>`;
        return;
      }
      gallery.style.display = "grid";
      items.forEach(item => gallery.appendChild(tile(item)));
    }

    function setActive(bucket) {
      active = bucket;
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.bucket === bucket);
      });
      render();
    }

    document.querySelectorAll(".tab").forEach(t => {
      t.addEventListener("click", () => setActive(t.dataset.bucket));
    });

    fetch("cards/index.json", { cache: "no-store" })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        DATA = data;
        BUCKETS.forEach(b => {
          const el = document.querySelector(`[data-count="${b}"]`);
          const n = (data.counts && data.counts[b]) || (data[b] ? data[b].length : 0);
          if (el) el.textContent = n;
        });
        render();
      })
      .catch(() => { DATA = null; render(); });

    render();
  </script>
</body>
</html>
