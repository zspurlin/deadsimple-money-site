<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dead Simple Money</title>
  <meta name="description" content="Markets, investing, and economic trends explained simply. No hype. No noise. Just signal." />
  <meta name="theme-color" content="#0a0a0a" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Dead Simple Money" />
  <meta property="og:description" content="Markets, investing, and economic trends explained simply. No hype. No noise. Just signal." />
  <meta property="og:url" content="https://deadsimple.money/" />
  <meta property="og:site_name" content="Dead Simple Money" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Dead Simple Money" />
  <meta name="twitter:description" content="Markets, investing, and economic trends explained simply. No hype. No noise. Just signal." />
  <meta name="twitter:site" content="@DeadSimpleMoney" />

  <link rel="canonical" href="https://deadsimple.money/" />

  <style>
    :root {
      --accent: #85BB65;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    h1 {
      font-family: "Didot", "Bodoni 72", "Cormorant Garamond", Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      letter-spacing: -0.01em;
      margin: 0 0 1.25rem;
      color: #fafafa;
    }

    .accent-rule {
      width: 36px;
      height: 2px;
      margin: 0 auto 1.25rem;
      background: var(--accent);
      border: 0;
    }

    .tagline {
      font-style: italic;
      font-weight: 600;
      color: #a0a0a0;
      margin: 0 0 2.75rem;
      font-size: clamp(1.3rem, 3.25vw, 1.5rem);
    }

    ul.bullets {
      list-style: none;
      padding: 0;
      margin: 0 0 3rem;
      color: #d4d4d4;
      font-size: clamp(0.95rem, 2.2vw, 1.05rem);
    }

    ul.bullets li {
      padding: 0.4rem 0;
    }

    ul.bullets li + li {
      border-top: 1px solid #1a1a1a;
    }

    nav.links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    nav.links a {
      display: inline-block;
      padding: 0.7rem 1.4rem;
      border: 1px solid #2a2a2a;
      color: #d4d4d4;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 150ms ease, border-color 150ms ease;
    }

    nav.links a:hover,
    nav.links a:focus-visible {
      color: var(--accent);
      border-color: var(--accent);
      outline: none;
    }

    @media (min-width: 768px) {
      body { padding: 4rem 2rem; }
      ul.bullets li { padding: 0.55rem 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      nav.links a { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Dead Simple Money</h1>
    <hr class="accent-rule" aria-hidden="true" />
    <p class="tagline">Clarity in a noisy market</p>
    <ul class="bullets">
      <li>What actually moves stocks</li>
      <li>No hype. No noise. Just signal.</li>
    </ul>
    <nav class="links" aria-label="Social channels">
      <a href="https://youtube.com/@DeadSimple" rel="noopener" target="_blank">YouTube</a>
      <a href="https://www.tiktok.com/@DeadSimpleHQ" rel="noopener" target="_blank">TikTok</a>
      <a href="https://x.com/DeadSimpleMoney" rel="noopener" target="_blank">X</a>
    </nav>
  </main>
</body>
</html>
